name: Selenium Sequential (Benchmark)

on:
  workflow_dispatch:

jobs:
  run-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Chrome Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml

  run-firefox:
    runs-on: ubuntu-latest
    needs: run-chrome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Firefox Tests
        run: mvn clean test -Dbrowser=firefox -Denv=dev -DsuiteXmlFile=testng-smoke.xml
